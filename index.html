<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Checklist & Audit Tool</title>
  <meta name="description" content="Interactive bilingual SEO checklist with auto-audit capabilities. Analyze your website and track optimization progress.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container" id="app">

    <!-- Top bar -->
    <div class="top-bar">
      <div class="lang-toggle" role="group" aria-label="Language">
        <button type="button" data-lang="en" class="active">EN</button>
        <button type="button" data-lang="fr">FR</button>
      </div>
      <button type="button" class="btn btn-danger" id="resetBtn">Reset</button>
    </div>

    <!-- Scorecard -->
    <div class="card scorecard" id="scorecard">
      <div class="score-header">
        <span class="score-value" id="scoreValue">0 / 0</span>
        <span class="score-pct" id="scorePct">0%</span>
        <span class="grade-badge" id="gradeBadge">—</span>
      </div>
      <div class="score-status" id="scoreStatus"></div>
      <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
      <div id="prioritiesSection">
        <div class="priorities-title" id="prioritiesTitle"></div>
        <ul class="priorities-list" id="prioritiesList"></ul>
      </div>
    </div>

    <!-- Audit area -->
    <div class="card" id="auditCard">
      <div class="card-title" data-i18n="auditTitle"></div>
      <div class="audit-form">
        <input type="url" class="audit-input" id="auditURL" placeholder="https://example.com">
        <button type="button" class="btn btn-primary" id="analyzeBtn" data-i18n="analyzeBtn"></button>
      </div>
      <div class="audit-disclaimer" data-i18n="auditDisclaimer"></div>
      <div class="audit-status" id="auditStatus"></div>
    </div>

    <!-- PageSpeed card -->
    <div class="card" id="psiCard">
      <div class="card-title" data-i18n="psiTitle"></div>
      <div class="psi-grid" id="psiGrid"></div>
    </div>

    <!-- Checklist groups -->
    <div class="groups-grid" id="groupsGrid"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
